services:
  - type: web
    name: return-os
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: DATA_DIR
        value: /var/data
    disk:
      name: return-os-data
      mountPath: /var/data
      sizeGB: 1
